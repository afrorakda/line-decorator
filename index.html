<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Line Decorator - Fridge Combo</title>
    <link rel="apple-touch-icon" href="image_20.png">
    <link rel="icon" type="image/png" href="image_20.png">
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --placeholder: #bbb;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .fridge-container { 
            width: 100%; 
            max-width: 400px; 
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .title-group { text-align: left; }
        h1 { font-size: 1.8rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .subtitle { color: #999; font-size: 0.8rem; font-weight: 600; }

        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 12px;
            border-radius: 10px;
        }

        .input-group { 
            position: relative; 
            margin-bottom: 15px; 
        }

        textarea {
            width: 100%;
            height: 180px;
            background: var(--input-bg);
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            padding: 15px;
            padding-right: 40px;
            font-size: 16px;
            color: var(--main);
            resize: none;
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
            transition: border-color 0.2s;
            font-weight: 500;
            line-height: 1.5;
        }
        textarea:focus, .decorator-input:focus { border-color: var(--main); }
        
        ::placeholder { color: var(--placeholder); -webkit-text-fill-color: var(--placeholder); opacity: 1; }

        .clr-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background: #ddd;
            color: #666;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            z-index: 5;
        }
        textarea + .clr-btn { top: 27px; }
        .input-field:not(:placeholder-shown) + .clr-btn { display: flex; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }
        .control-group { text-align: left; }
        .label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .decorator-input {
            width: 100%;
            background: var(--input-bg);
            border: 2px solid var(--accent);
            border-radius: 12px;
            padding: 12px;
            padding-right: 35px;
            font-size: 1rem;
            color: var(--main);
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            transition: border-color 0.2s;
        }

        #statusMessage {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--main);
            height: 20px;
            margin-bottom: 10px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .main-btn {
            width: 100%;
            background: var(--main);
            color: #fff;
            border: none;
            padding: 20px;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            -webkit-appearance: none;
        }
        .main-btn:active { transform: scale(0.98); }

        .footer-btns { 
            margin-top: auto;
            padding-top: 40px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            margin-bottom: 30px; 
        }

        .kofi-btn, .home-btn {
            width: 100%;
            max-width: 250px;
            padding: 14px;
            border-radius: var(--radius);
            font-weight: 800;
            font-size: 0.9rem;
            text-decoration: none;
            text-align: center;
            border: none;
            cursor: pointer;
        }
        .kofi-btn { background: #fff; color: var(--main); border: 2px solid var(--main); }
        .home-btn { background: var(--accent); color: var(--main); }

        footer { 
            width: 100%;
            padding-bottom: 20px;
            text-align: center;
            font-size: 0.75rem; 
            color: #bbb; 
            font-weight: 600;
            line-height: 1.6; 
        }
        footer a { color: inherit; text-decoration: underline; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: var(--radius); width: 85%; max-width: 320px; text-align: center; position: relative; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 1.5rem; cursor: pointer; color: #aaa; font-weight: bold; }
    </style>
</head>
<body>

<div class="fridge-container">
    <header>
        <div class="title-group">
            <h1>Line Decorator</h1>
            <p class="subtitle">Frame and embellish your list.</p>
        </div>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>

    <div class="input-group">
        <textarea id="input" class="input-field" placeholder="Paste your lines here..." onclick="this.select()"></textarea>
        <button class="clr-btn" onclick="clearInput('input')">×</button>
    </div>

    <div class="controls">
        <div class="control-group">
            <label class="label">Prefix (Head)</label>
            <div style="position:relative">
                <input type="text" id="prefix" class="decorator-input input-field" placeholder="e.g. • " onclick="this.select()">
                <button class="clr-btn" onclick="clearInput('prefix')">×</button>
            </div>
        </div>
        <div class="control-group">
            <label class="label">Suffix (Tail)</label>
            <div style="position:relative">
                <input type="text" id="suffix" class="decorator-input input-field" placeholder="e.g. ," onclick="this.select()">
                <button class="clr-btn" onclick="clearInput('suffix')">×</button>
            </div>
        </div>
    </div>

    <div id="statusMessage"></div>

    <button class="main-btn" id="decorateBtn">Decorate & Copy</button>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️Buy me a coffee</a>
        <button class="home-btn" id="homeBtn">Add to Home Screen</button>
    </div>

    <footer id="dynamicFooter">
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a><br>
        afrorakda © 2026
    </footer>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="close">&times;</span>
        <h3 style="margin-top:0">📱 Install</h3>
        <p style="font-size:0.9rem; color:#666">Add to home screen.<br><br>🍏 <b>Safari</b>: Share > Add to Home Screen<br>🤖 <b>Chrome</b>: Menu > Add to home screen</p>
    </div>
</div>

<script>
    const input = document.getElementById('input');
    const prefixInput = document.getElementById('prefix');
    const suffixInput = document.getElementById('suffix');
    const decorateBtn = document.getElementById('decorateBtn');
    const statusMsg = document.getElementById('statusMessage');
    const modal = document.getElementById('modal');

    function clearInput(id) {
        const el = document.getElementById(id);
        el.value = '';
        statusMsg.style.opacity = '0';
        el.focus();
    }

    decorateBtn.addEventListener('click', () => {
        if (!input.value.trim()) return;

        const start = input.selectionStart;
        const lines = input.value.split('\n');
        const prefix = prefixInput.value;
        const suffix = suffixInput.value;
        let count = 0;

        const processed = lines.map(line => {
            if (line.trim() === '') return line;
            count++;
            return `${prefix}${line}${suffix}`;
        }).join('\n');

        input.value = processed;
        input.setSelectionRange(start, start);

        navigator.clipboard.writeText(processed).then(() => {
            statusMsg.textContent = `✨ ${count} lines decorated & Copied!`;
            statusMsg.style.opacity = '1';
            
            const originalText = decorateBtn.textContent;
            decorateBtn.textContent = 'Copied!';
            
            setTimeout(() => {
                decorateBtn.textContent = originalText;
                statusMsg.style.opacity = '0';
            }, 2000);
        });
    });

    document.getElementById('homeBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('close').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };

    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const data = await res.json();
                if (data.footerHtml) {
                    document.getElementById('dynamicFooter').innerHTML = data.footerHtml;
                }
            }
        } catch(e) {}
    }
    window.onload = loadFooter;
</script>

</body>
</html>
